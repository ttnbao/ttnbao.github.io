<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}" />
    <link
      rel="icon"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="10" fill="%23203040"/><text x="32" y="41" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700" fill="white">TB</text></svg>'
    />
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
    {% seo title=false %}
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="Tingnan Bao homepage">{{ site.title }}</a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="#news">News</a>
        <a href="#research">Research</a>
        <a href="#publications">Publications</a>
        <a href="#service">Service</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main id="top">
      {{ content }}
    </main>

    <footer class="footer">
      <p>© <span id="year"></span> {{ site.title }}. Built with Jekyll for GitHub Pages.</p>
    </footer>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
